version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nems_mysql
    environment:
      MYSQL_ROOT_PASSWORD: nems_password
      MYSQL_DATABASE: nems_db
      MYSQL_USER: nems_user
      MYSQL_PASSWORD: nems_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nems_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:

networks:
  nems_network:
    driver: bridge